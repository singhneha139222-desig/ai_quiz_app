<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groq AI Quiz Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .card {
            border: none;
            border-radius: 10px;
        }
        #quiz-result strong {
            display: inline-block;
            margin-top: 15px;
            font-size: 1.1em;
        }
        #quiz-result p {
            margin-bottom: 12px;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="text-center text-primary mb-4">Groq AI Quiz Generator</h1>
        
        <div class="card p-4 shadow-sm mb-4">
            <form method="POST">
                <div class="mb-3">
                    <label for="topic" class="form-label">Enter a Topic for the Quiz:</label>
                    <input type="text" name="topic" id="topic" class="form-control" placeholder="e.g. Python OOPS, functions" required>
                </div>
                <button type="submit" class="btn btn-primary">Generate Quiz</button>
            </form>
        </div>
        {% if error %}
        <div class="alert alert-danger shadow-sm">
            {{ error }}
        </div>
        {% endif %}

        {% if result %}
        <div class="card p-4 shadow-sm">
            <h3 class="mb-3 border-bottom pb-2 text-primary">Generated Quiz:</h3>
            <div id="quiz-result" class="fs-5 lh-lg"></div>
        </div>
        
        <script>
            const rawResult = {{ result | tojson | safe }};
            document.getElementById('quiz-result').innerHTML = marked.parse(rawResult);
        </script>
        {% endif %}
    </div>
</body>
</html>
